name: Build Firmware

on:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to publish a release on tag pushes
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO
        run: pip install platformio==6.1.19

      - name: Run native unit tests
        run: cd "C++/Main board C++" && pio test -e native

      - name: Build main board
        run: ./build.sh main

      - name: Upload main board UF2
        uses: actions/upload-artifact@v4
        with:
          name: main-board-${{ github.run_number }}
          path: build/main.uf2

      - name: Build BLE board
        if: startsWith(github.ref, 'refs/tags/')
        run: ./build.sh ble

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/main.uf2
            build/ble.uf2
          generate_release_notes: true
